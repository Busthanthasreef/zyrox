<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Purple-blue radial gradient background (matches the image) -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#6b5ce7"/>
      <stop offset="60%" stop-color="#5b4de0"/>
      <stop offset="100%" stop-color="#3a2db5"/>
    </radialGradient>
    <!-- Glow for eyes -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </radialGradient>
    <!-- Robot body gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f5"/>
      <stop offset="100%" stop-color="#d8d8e8"/>
    </linearGradient>
    <!-- Eye glow filter -->
    <filter id="eyeFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Outer glow filter for eyes -->
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft shadow for robot -->
    <filter id="robotShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="60" cy="60" r="60" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <circle cx="60" cy="58" r="52" fill="none" stroke="rgba(150,130,255,0.25)" stroke-width="1.5"/>

  <!-- ── ROBOT ── -->
  <g filter="url(#robotShadow)">

    <!-- Left antenna arm (red, angled outward) -->
    <rect x="30" y="28" width="5" height="22" rx="2.5" fill="#e53935" transform="rotate(-12, 32, 39)"/>
    <!-- Left antenna tip (blue glow ball) -->
    <circle cx="27" cy="26" r="4" fill="#4fc3f7"/>
    <circle cx="27" cy="26" r="2.5" fill="#81d4fa" opacity="0.9"/>

    <!-- Right antenna arm (red, angled outward) -->
    <rect x="85" y="28" width="5" height="22" rx="2.5" fill="#e53935" transform="rotate(12, 87, 39)"/>
    <!-- Right antenna tip (blue glow ball) -->
    <circle cx="93" cy="26" r="4" fill="#4fc3f7"/>
    <circle cx="93" cy="26" r="2.5" fill="#81d4fa" opacity="0.9"/>

    <!-- Yellow top cap -->
    <rect x="44" y="32" width="32" height="10" rx="5" fill="#ffc107"/>
    <rect x="48" y="30" width="24" height="6" rx="3" fill="#ffca28"/>

    <!-- Robot head/body (main white-grey box) -->
    <rect x="36" y="40" width="48" height="44" rx="8" fill="url(#bodyGrad)"/>
    <!-- Subtle inner border -->
    <rect x="36" y="40" width="48" height="44" rx="8" fill="none" stroke="rgba(100,100,150,0.2)" stroke-width="1"/>

    <!-- Dark visor/screen area -->
    <rect x="41" y="47" width="38" height="22" rx="5" fill="#1a1a2e"/>
    <rect x="41" y="47" width="38" height="22" rx="5" fill="none" stroke="rgba(79,110,247,0.4)" stroke-width="1"/>

    <!-- Left eye (cyan glowing) -->
    <ellipse cx="52" cy="58" rx="6" ry="7" fill="#001a2e" filter="url(#glowFilter)"/>
    <ellipse cx="52" cy="58" rx="4.5" ry="5.5" fill="url(#eyeGlow)" opacity="0.95"/>
    <ellipse cx="52" cy="58" rx="2.5" ry="3" fill="#e0ffff"/>
    <!-- Eye inner glow -->
    <ellipse cx="52" cy="56" rx="1.5" ry="1.5" fill="white" opacity="0.8"/>

    <!-- Right eye (cyan glowing) -->
    <ellipse cx="68" cy="58" rx="6" ry="7" fill="#001a2e" filter="url(#glowFilter)"/>
    <ellipse cx="68" cy="58" rx="4.5" ry="5.5" fill="url(#eyeGlow)" opacity="0.95"/>
    <ellipse cx="68" cy="58" rx="2.5" ry="3" fill="#e0ffff"/>
    <!-- Eye inner glow -->
    <ellipse cx="68" cy="56" rx="1.5" ry="1.5" fill="white" opacity="0.8"/>

    <!-- Mouth / speaker grille -->
    <rect x="47" y="74" width="26" height="7" rx="3.5" fill="#2a2a3e"/>
    <!-- Grille lines -->
    <line x1="52" y1="75.5" x2="52" y2="79.5" stroke="rgba(79,110,247,0.5)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="57" y1="75.5" x2="57" y2="79.5" stroke="rgba(79,110,247,0.5)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="62" y1="75.5" x2="62" y2="79.5" stroke="rgba(79,110,247,0.5)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="67" y1="75.5" x2="67" y2="79.5" stroke="rgba(79,110,247,0.5)" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Side ear panels (left) -->
    <rect x="30" y="48" width="7" height="18" rx="3" fill="#c8c8d8"/>
    <rect x="31.5" y="52" width="4" height="10" rx="2" fill="#a0a0b8"/>

    <!-- Side ear panels (right) -->
    <rect x="83" y="48" width="7" height="18" rx="3" fill="#c8c8d8"/>
    <rect x="84.5" y="52" width="4" height="10" rx="2" fill="#a0a0b8"/>

    <!-- Chin / lower body -->
    <rect x="42" y="82" width="36" height="8" rx="4" fill="#d0d0e0"/>

  </g>

  <!-- Subtle bottom reflection -->
  <ellipse cx="60" cy="115" rx="30" ry="5" fill="rgba(0,0,0,0.15)"/>
</svg>
